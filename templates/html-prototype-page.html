    <!--
      HTML 原型模板规范（AI 创建页面前必须先读完）

      1. 本文件用于需求阶段原型。复制本文件后再修改，不要从历史 HTML 复制代码。
      2. 可参考旧页面的视觉，但只复刻布局、间距、字体、颜色和组件效果。
      3. 只修改标记为 [AI-EDIT] 的区域；[TEMPLATE-LOCK] 区域保持结构和标记不变。
      4. 页面标题区不是强制结构：一级列表、配置和看板通常使用 standard；二级详情页可使用 back-only 或 none。
         使用 none 时删除整个 data-page-header，页面直接从 data-business-content 开始。
      5. data-page-content 是完整页面；标题和子标题下方必须保留唯一 data-business-content 自由业务区。
         默认的筛选和表格只是示例，可按实际业务整体替换为统计卡、表单、详情、看板、控制台、地图或其他布局。
         只保留 data-business-content 外层标记，不得要求所有页面都使用列表结构。
         弹窗和抽屉必须放进 data-page-overlay。
      6. 页面状态、方法和模拟数据只能写在 PAGE_LOGIC_START/END 之间。
      7. 页面专属样式只能写在 PAGE_STYLE_START/END 之间，并以页面根类名开头。
      8. 禁止 onclick、直接操作 DOM、window.location、.html 跳转、jQuery 和未登记依赖。
      9. Element Plus 组件必须显式闭合，不能使用自闭合写法。
      10. 不新增全局样式、CDN、外部字体和外部图片；独立预览依赖由模板统一提供。
      11. 字号统一使用模板变量：页面标题 24px、区块标题 16px、正文/表格/表单/详情字段 14px、辅助信息 12-13px。
          不允许依赖浏览器默认字号，也不得把详情字段放大到与区块标题相同的层级。
      12. 查询、重置、刷新等紧凑工具操作使用图标按钮，并提供 Tooltip 与 aria-label；
          编辑、删除、查看、审核、停用等业务操作使用文字按钮，不得改成只有图标的按钮。
      13. 页面定案后不再修改 HTML，由导入器提取内容、覆盖层、逻辑和样式生成 Vue 页面。
    -->

          <section
            class="standard-list-page"
            data-page-content
            data-page-root="standard-list-page"
            data-page-key="standard-list-page"
          >
            <!--
              [AI-EDIT] PAGE_HEADER_OPTIONAL
              standard：保留标题、子标题和右侧页面主操作，主操作与标题区底部对齐；
              back-only：改为返回按钮或对象摘要，不强制显示 H1；

            <div
              class="page-heading"
              data-page-header="standard"
              data-block-id="page-heading"
              data-block-name="页面标题"
            >
              <div>
                <h1>标准列表页</h1>
                <p>用一句话说明页面管理对象、数据范围和主要用途。</p>
              </div>
              <el-button type="primary" size="large" :icon="Plus" @click="openCreateDialog"

            </div>

            <!--
              [AI-EDIT] BUSINESS_CONTENT_START
              子标题以下全部属于自由业务内容区。下面仅提供与“个人会员管理”一致的“筛选 + 表格”默认示例。
              可根据实际需求删除并整体重做内部结构，例如：
              - 表单/新增流程：分组表单、步骤、费用摘要、确认区；
              - 详情页：摘要、分组资料、时间线、日志；
              - 看板/控制台：对象列表、地图、甘特图、图表、操作面板；
              - 配置页：标签页、规则区、版本和日志。
              无论使用哪种布局，只保留唯一 data-business-content 外层节点，并将 data-layout-type

            <div data-business-content data-layout-type="list">

                    </el-tooltip>
                    <el-button type="primary" plain :icon="Download" @click="exportRows">导出</el-button>
                  </div>
                  <div class="filter-summary">共 {{ filteredRows.length }} 笔资料</div>
                </div>

                <div class="table-wrap">
                  <el-table :data="pagedRows" row-key="id" stripe style="width: 100%">
                    <el-table-column prop="code" label="编号" width="140"></el-table-column>
                    <el-table-column label="名称" min-width="220">

                        </div>
                      </template>
                    </el-table-column>
                    <el-table-column prop="category" label="分类" min-width="150"></el-table-column>
                    <el-table-column label="状态" width="110">
                      <template #default="scope">
                        <el-tag :type="scope.row.status === 'enabled' ? 'success' : 'info'">
                          {{ scope.row.status === 'enabled' ? '启用' : '停用' }}

                    </el-table-column>
                    <el-table-column prop="updatedAt" label="更新时间" width="170"></el-table-column>

          <el-form-item label="资料分类" prop="category">

        <template #footer>

            <el-button @click="dialogVisible = false">取消</el-button>

    <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>

    <script data-page-script>
      /* [AI-EDIT] PAGE_LOGIC_START: 只写页面状态、计算属性、方法和模拟数据。 */
      function pageSetup() {
        const { ref, reactive, computed } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;

        const filters = reactive({ keyword: '', status: '' });
        const pagination = reactive({ page: 1, pageSize: 10 });
        const dialogVisible = ref(false);
        const dialogMode = ref('create');
        const editingId = ref(null);
        const submitting = ref(false);
        const formRef = ref();
        const form = reactive({ name: '', category: '', enabled: true, description: '' });

        const rows = ref([
          {
            id: 1,
            code: 'ITEM-001',
            name: '示例资料一',
            category: '一般资料',
            status: 'enabled',
            description: '用于展示正常启用状态',
            updatedAt: '2026-07-13 10:20',
          },
          {
            id: 2,
            code: 'ITEM-002',
            name: '示例资料二',
            category: '重点资料',
            status: 'disabled',
            description: '用于展示停用状态',
            updatedAt: '2026-07-12 16:40',
          },
          {
            id: 3,
            code: 'ITEM-003',
            name: '示例资料三',
            category: '一般资料',
            status: 'enabled',
            description: '用于展示列表和编辑交互',
            updatedAt: '2026-07-11 09:15',
          },
        ]);

        const filteredRows = computed(() => {
          const keyword = filters.keyword.trim().toLowerCase();
          return rows.value.filter((item) => {
            const matchesStatus = !filters.status || item.status === filters.status;
            const matchesKeyword =
              !keyword ||
              item.code.toLowerCase().includes(keyword) ||
              item.name.toLowerCase().includes(keyword);
            return matchesStatus && matchesKeyword;
          });
        });

        const pagedRows = computed(() => {
          const start = (pagination.page - 1) * pagination.pageSize;
          return filteredRows.value.slice(start, start + pagination.pageSize);
        });

        const formRules = {
          name: [{ required: true, message: '请输入资料名称', trigger: 'blur' }],
          category: [{ required: true, message: '请选择资料分类', trigger: 'change' }],
        };

        function resetFilters() {
          filters.keyword = '';
          filters.status = '';
          pagination.page = 1;
        }

        function resetForm() {
          form.name = '';
          form.category = '';
          form.enabled = true;
          form.description = '';
        }

        function openCreateDialog() {
          dialogMode.value = 'create';
          editingId.value = null;
          resetForm();
          dialogVisible.value = true;
        }

        function openEditDialog(row) {
          dialogMode.value = 'edit';
          editingId.value = row.id;
          form.name = row.name;
          form.category = row.category;
          form.enabled = row.status === 'enabled';
          form.description = row.description;
          dialogVisible.value = true;
        }

        async function submitForm() {
          if (!formRef.value) return;
          const valid = await formRef.value.validate().catch(() => false);
          if (!valid) return;
          submitting.value = true;
          await new Promise((resolve) => setTimeout(resolve, 300));
          if (dialogMode.value === 'create') {
            rows.value.unshift({
              id: Date.now(),
              code: `ITEM-${String(rows.value.length + 1).padStart(3, '0')}`,
              name: form.name,
              category: form.category,
              status: form.enabled ? 'enabled' : 'disabled',
              description: form.description || '暂无说明',
              updatedAt: '2026-07-13 14:30',
            });
          } else {
            const target = rows.value.find((item) => item.id === editingId.value);
            if (target) {
              target.name = form.name;
              target.category = form.category;
              target.status = form.enabled ? 'enabled' : 'disabled';
              target.description = form.description || '暂无说明';
            }
          }
          submitting.value = false;
          dialogVisible.value = false;
          ElMessage.success('保存成功');
        }

        async function removeRow(row) {
          await ElMessageBox.confirm(`确认删除“${row.name}”吗？`, '删除确认', { type: 'warning' });
          rows.value = rows.value.filter((item) => item.id !== row.id);
          ElMessage.success('删除成功');
        }

        function exportRows() {
          ElMessage.success('已生成导出演示结果');
        }

        return {
          Search: ElementPlusIconsVue.Search,
          Refresh: ElementPlusIconsVue.Refresh,
          Plus: ElementPlusIconsVue.Plus,
          Download: ElementPlusIconsVue.Download,
          filters,
          pagination,
          dialogVisible,
          dialogMode,
          submitting,
          formRef,
          form,
          formRules,
          filteredRows,
          pagedRows,
          resetFilters,
          openCreateDialog,
          openEditDialog,
          submitForm,
          removeRow,
          exportRows,
        };
      }
      /* PAGE_LOGIC_END */

      /* TEMPLATE-LOCK: PROTOTYPE_BOOTSTRAP_START。导入时移除，不得放业务逻辑。 */
      const app = Vue.createApp({ setup: pageSetup });
      app.use(ElementPlus);
      app.mount('#app');
      /* PROTOTYPE_BOOTSTRAP_END */
    </script>
  </body>
</html>
