            if (!folderFilterEl.contains(e.target)) folderFilterEl.classList.remove("open");
        });

        let activeDoc = null;
        let activeFolder = "";
        const menuEl = document.getElementById("docMenu");
        const searchEl = document.getElementById("docSearch");
        const contentEl = document.getElementById("markdownContent");
        const titleEl = document.getElementById("docTitle");
        const pathEl = document.getElementById("docPath");
        const groupEl = document.getElementById("docGroup");
        const scanStatusEl = document.getElementById("scanStatus");
        const countEl = document.getElementById("docCount");
        const reloadButton = document.getElementById("reloadButton");
        updateDocCount();

        function updateScanStatus(text, type = "neutral") {
            scanStatusEl.textContent = text;
            scanStatusEl.classList.toggle("text-emerald-700", type === "success");
            scanStatusEl.classList.toggle("text-amber-700", type === "warning");
            scanStatusEl.classList.toggle("text-slate-600", type === "neutral");
        }

        function updateDocCount() {
            countEl.textContent = `${mdFiles.length} 个文档`;
        }

        async function loadMdFilesFromServer() {
            if (location.protocol === "file:") {
                updateScanStatus("内置清单", "warning");
                return fallbackMdFiles;
            }
            updateScanStatus("扫描中", "neutral");
            try {
                const response = await fetch(MD_FILES_API, { cache: "no-store" });
                if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
                const data = await response.json();
                if (!data || !Array.isArray(data.files) || !data.files.length) {
                    throw new Error("API 未返回有效文档清单");
                }
                updateScanStatus("API扫描", "success");
                return data.files;
            } catch (error) {
                console.warn("PRD 文档目录 API 扫描失败，尝试读取静态服务目录列表。", error);
            }

            try {
                const files = await scanMarkdownFromDirectoryListing(new URL(DOC_BASE, location.href));
                if (files.length) {
                    updateScanStatus("目录扫描", "success");
                    return files;
                }
            } catch (error) {
                console.warn("PRD 文档目录列表扫描失败，已使用页面内置清单。", error);
            }

            updateScanStatus("内置清单", "warning");
            return fallbackMdFiles;
        }

        async function scanMarkdownFromDirectoryListing(rootUrl) {
            const visited = new Set();
            const files = [];
            const rootPath = ensureTrailingSlash(rootUrl.pathname);

            async function walk(dirUrl) {
                const cleanDirKey = ensureTrailingSlash(dirUrl.pathname);
                if (visited.has(cleanDirKey)) return;
                visited.add(cleanDirKey);

                const fetchUrl = new URL(dirUrl.href);
                fetchUrl.searchParams.set("_", String(Date.now()));
                const response = await fetch(fetchUrl.href, { cache: "no-store" });
                if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);

                const html = await response.text();
                const doc = new DOMParser().parseFromString(html, "text/html");
                const anchors = Array.from(doc.querySelectorAll("a[href]"));

                for (const anchor of anchors) {
                    const rawHref = anchor.getAttribute("href");
                    if (!rawHref || rawHref === "#" || rawHref.startsWith("?")) continue;
                    const nextUrl = new URL(rawHref, dirUrl.href);
                    if (nextUrl.origin !== location.origin) continue;
                    if (!nextUrl.pathname.startsWith(rootPath)) continue;

                    const decodedPath = decodeURIComponent(nextUrl.pathname);
                    if (decodedPath.includes("/../")) continue;
                    if (decodedPath === decodeURIComponent(dirUrl.pathname)) continue;

                    if (nextUrl.pathname.toLowerCase().endsWith(".md")) {
                        files.push(buildMdFileFromPath(relativeMdPath(nextUrl.pathname, rootPath)));
                    } else if (isDirectoryHref(rawHref, nextUrl)) {
                        await walk(nextUrl);
                    }
                }
            }

            await walk(rootUrl);
            return uniqueAndSortFiles(files);
        }

        function ensureTrailingSlash(pathname) {
            return pathname.endsWith("/") ? pathname : `${pathname}/`;
        }

        function isDirectoryHref(rawHref, url) {
            if (rawHref.endsWith("/")) return true;
            const lastSegment = url.pathname.split("/").filter(Boolean).pop() || "";
            return !lastSegment.includes(".");
        }

        function relativeMdPath(pathname, rootPath) {
            const decodedRoot = decodeURIComponent(rootPath);
            const decodedPath = decodeURIComponent(pathname);
            return decodedPath.slice(decodedRoot.length).replace(/^\/+/, "");
        }

        function buildMdFileFromPath(path) {
            const normalizedPath = path.replace(/\\/g, "/");
            const parts = normalizedPath.split("/");
            const fileName = parts.pop() || normalizedPath;
            const folder = parts.length ? parts.join(" / ") : "PRD";
            const title = fileName.replace(/\.md$/i, "").replace(/^\d+[_-]/, "");
            return { group: folder, title, path: normalizedPath };
        }

        function uniqueAndSortFiles(files) {
            const map = new Map();
            files.forEach(file => {
                if (file.path && !map.has(file.path)) map.set(file.path, file);
            });
            return Array.from(map.values()).sort((a, b) => {
                const groupCompare = a.group.localeCompare(b.group, "zh-Hans-CN", { numeric: true });
                if (groupCompare !== 0) return groupCompare;
                return a.title.localeCompare(b.title, "zh-Hans-CN", { numeric: true });
            });
        }

        async function initializeDocs(preferredPath = "") {
            mdFiles = await loadMdFilesFromServer();
            if (activeFolder && !mdFiles.some(file => getTopFolder(file.path) === activeFolder)) activeFolder = "";
            updateDocCount();
            renderFolderOptions();
            renderMenu(searchEl.value);
            const hashPath = preferredPath || decodeURIComponent(location.hash.replace(/^#/, ""));
            const nextDoc = mdFiles.find(file => file.path === hashPath) || mdFiles[0];
            if (nextDoc) await loadDoc(nextDoc);
        }

        function renderFolderOptions() {
            const folders = Array.from(new Set(mdFiles.map(file => getTopFolder(file.path)).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b, "zh-Hans-CN", { numeric: true }));
            const options = [{ value: "", label: "全部文件夹" }, ...folders.map(folder => ({ value: folder, label: folder }))];
            folderDropdownEl.innerHTML = options.map(option => `
                <div class="folder-filter-option ${option.value === activeFolder ? "active" : ""}" data-value="${escapeHtml(option.value)}">${escapeHtml(option.label)}</div>
            `).join("");
            folderLabelEl.textContent = activeFolder || "全部文件夹";
        }

        function renderMenu(keyword = "") {
            const normalized = keyword.trim().toLowerCase();
            const filtered = mdFiles.filter(file => {
                if (activeFolder && getTopFolder(file.path) !== activeFolder) return false;
                if (normalized && !`${file.group} ${file.title} ${file.path}`.toLowerCase().includes(normalized)) return false;
                return true;
            });
            const groups = filtered.reduce((map, file) => {
                if (!map.has(file.group)) map.set(file.group, []);
                map.get(file.group).push(file);
                return map;
            }, new Map());
            menuEl.innerHTML = "";
            if (!filtered.length) {
                menuEl.innerHTML = `<div class="px-3 py-8 text-center text-sm text-white/50">没有匹配的文档</div>`;
                return;
            }
            for (const [group, files] of groups.entries()) {
                const groupTitle = document.createElement("div");
                groupTitle.className = "doc-group-title";
                groupTitle.textContent = group;
                menuEl.appendChild(groupTitle);
                files.forEach(file => {
                    const button = document.createElement("button");
                    button.className = `doc-link ${activeDoc && activeDoc.path === file.path ? "active" : ""}`;
                    button.type = "button";
                    button.innerHTML = `
                        <svg class="doc-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M6.75 3A2.75 2.75 0 0 0 4 5.75v12.5A2.75 2.75 0 0 0 6.75 21h10.5A2.75 2.75 0 0 0 20 18.25V8.621a2.75 2.75 0 0 0-.805-1.945l-2.87-2.871A2.75 2.75 0 0 0 14.38 3H6.75Zm7.75 1.75V8a1.5 1.5 0 0 0 1.5 1.5h3.25v8.75c0 .69-.56 1.25-1.25 1.25H6.75c-.69 0-1.25-.56-1.25-1.25V5.75c0-.69.56-1.25 1.25-1.25h7.75Zm1.5.31c.09.055.174.122.25.198l2.492 2.492c.076.076.143.16.198.25H16V5.06ZM8 12.25a.75.75 0 0 0 0 1.5h8a.75.75 0 0 0 0-1.5H8Zm0 3.25a.75.75 0 0 0 0 1.5h5.5a.75.75 0 0 0 0-1.5H8Z"/>
                        </svg>
                        <span class="doc-title">${escapeHtml(file.title)}</span>
                        <span class="doc-path">${escapeHtml(file.path)}</span>
                    `;
                    button.addEventListener("click", () => loadDoc(file));
                    menuEl.appendChild(button);
                });
            }
        }

        async function loadDoc(file) {
            activeDoc = file;
            renderMenu(searchEl.value);
            titleEl.textContent = file.title;
            pathEl.textContent = `${DOC_BASE}${file.path}`;
            groupEl.textContent = file.group;
            contentEl.innerHTML = `<div class="empty-state"><div>正在载入文档...</div></div>`;
            try {
                const url = encodeURI(`${DOC_BASE}${file.path}`);
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) throw new Error(`${response.status} ${response.statusText}：${url}`);
                const markdown = await response.text();
                await renderMarkdown(markdown, file);
                location.hash = encodeURIComponent(file.path);
            } catch (error) {
                contentEl.innerHTML = `
                    <div class="empty-state">
                        <div>
                            <div class="text-lg font-bold text-red-600">文档读取失败</div>
                            <div class="mt-2 text-sm">请确认访问地址是 <strong>/PRD阅读器.html</strong>，并且本地服务文件与本页面在同一目录。</div>
                            <div class="mt-3 text-xs text-slate-400">${escapeHtml(String(error.message || error))}</div>
                        </div>
                    </div>
                `;
            }
        }

        async function renderMarkdown(markdown, file) {
            const html = window.marked ? marked.parse(markdown, { breaks: false, gfm: true }) : fallbackMarkdown(markdown);
            contentEl.innerHTML = window.DOMPurify ? DOMPurify.sanitize(html) : html;
            prepareMermaidBlocks();
            adjustRelativeAssets(file);
            await renderMermaidBlocks();
        }

        function prepareMermaidBlocks() {
            contentEl.querySelectorAll("pre > code.language-mermaid").forEach((code, index) => {
                const pre = code.parentElement;
                const chart = document.createElement("div");
                chart.className = "mermaid";
                chart.dataset.mermaidIndex = String(index + 1);
                chart.textContent = code.textContent.trim();
                pre.replaceWith(chart);
            });
        }

        async function renderMermaidBlocks() {
            const blocks = Array.from(contentEl.querySelectorAll(".mermaid"));
            if (!blocks.length) return;
            if (!window.mermaid) {
                blocks.forEach(block => {
                    block.className = "mermaid-error";
                    block.textContent = "Mermaid 组件载入失败，无法显示流程图或时序图。请确认当前浏览器可访问 CDN。";
                });
                return;
            }
            for (const block of blocks) {
                const source = block.textContent;
                try {
                    const id = `mermaid-${Date.now()}-${block.dataset.mermaidIndex || Math.random().toString(16).slice(2)}`;
                    const result = await mermaid.render(id, source);
                    block.innerHTML = result.svg;
                    if (result.bindFunctions) result.bindFunctions(block);
                } catch (error) {
                    block.className = "mermaid-error";
                    block.innerHTML = `
                        <div class="font-bold">流程图渲染失败</div>
                        <div class="mt-1">${escapeHtml(String(error.message || error))}</div>
                        <pre class="mt-3 whitespace-pre-wrap">${escapeHtml(source)}</pre>
                    `;
                }
            }
        }

        function adjustRelativeAssets(file) {
            const baseParts = `${DOC_BASE}${file.path}`.split("/");
            baseParts.pop();
            const base = baseParts.join("/");
            contentEl.querySelectorAll("img").forEach(img => {
                const src = img.getAttribute("src");
                if (src && !isAbsoluteUrl(src) && !src.startsWith("#")) img.setAttribute("src", normalizePath(`${base}/${src}`));
            });
        }

        function fallbackMarkdown(markdown) {
            return markdown.split(/\n{2,}/).map(block => {
                const line = block.trim();
                if (!line) return "";
                if (line.startsWith("### ")) return `<h3>${escapeHtml(line.slice(4))}</h3>`;
                if (line.startsWith("## ")) return `<h2>${escapeHtml(line.slice(3))}</h2>`;
                if (line.startsWith("# ")) return `<h1>${escapeHtml(line.slice(2))}</h1>`;
                return `<p>${escapeHtml(line).replace(/\n/g, "<br>")}</p>`;
            }).join("");
        }

        function normalizePath(path) {
            const parts = [];
            path.replace(/\\/g, "/").split("/").forEach(part => {
                if (!part || part === ".") return;
                if (part === "..") parts.pop();
                else parts.push(part);
            });
            return parts.join("/");
        }

        function isAbsoluteUrl(url) {
            return /^(https?:|data:|mailto:|tel:)/i.test(url);
        }

        function escapeHtml(value) {
            return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        searchEl.addEventListener("input", event => renderMenu(event.target.value));
        reloadButton.addEventListener("click", () => initializeDocs(activeDoc ? activeDoc.path : ""));
        initializeDocs();
    </script>
</body>
</html>
